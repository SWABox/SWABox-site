<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 - 禁止访问 | SWABox</title>
  <style>
    :root {
      --bg-base: #0a0a0a;
      --bg-elevated: #111111;
      --bg-surface: #181818;
      --bg-hover: #1f1f1f;
      --green-primary: #22c55e;
      --green-light: #86efac;
      --green-glow: rgba(34, 197, 94, 0.15);
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --text-dim: #52525b;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-default: rgba(255, 255, 255, 0.1);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg-base);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 100% 80% at 20% 0%, rgba(34, 197, 94, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse 80% 60% at 80% 100%, rgba(34, 197, 94, 0.03) 0%, transparent 50%);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 20px;
      max-width: 800px;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-link {
      display: inline-block;
      margin-bottom: 40px;
      cursor: pointer;
    }

    .logo-img {
      height: 56px;
      width: auto;
      opacity: 0.9;
      transition: opacity 0.3s;
    }

    .logo-img:hover {
      opacity: 1;
    }

    .icon-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 32px;
    }

    .error-icon {
      width: 100%;
      height: 100%;
      animation: float 3.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .status-code {
      position: absolute;
      bottom: -12px;
      right: -24px;
      font-size: 52px;
      font-weight: 900;
      color: rgba(34, 197, 94, 0.15);
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
    }

    .title {
      font-size: 40px;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 17px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 48px;
      white-space: pre-line;
    }

    .actions {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 32px;
      border-radius: var(--radius-md);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--green-primary);
      color: #000;
    }

    .btn-primary:hover {
      background: var(--green-light);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-default);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
      border-color: var(--green-primary);
      color: var(--green-primary);
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      .title { font-size: 32px; }
      .subtitle { font-size: 15px; }
      .icon-wrapper { width: 140px; height: 140px; }
      .status-code { font-size: 42px; }
    }

    @media (max-width: 480px) {
      .actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="content" id="content">
    <div class="logo-link" onclick="window.location.href='/'">
      <img src="/logo-nobg.png" alt="SWABox Logo" class="logo-img">
    </div>

    <div class="icon-wrapper">
      <svg class="error-icon" viewBox="0 0 100 100" fill="none">
        <rect x="32" y="32" width="36" height="36" stroke="var(--green-primary)" stroke-width="4" opacity="0.1" rx="4"/>
        <rect x="40" y="40" width="20" height="20" stroke="var(--green-primary)" stroke-width="4" opacity="0.2" rx="2"/>
        <path d="M45 52 L55 52 M50 47 L50 57" stroke="var(--text-dim)" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <span class="status-code">403</span>
    </div>

    <h1 class="title">禁止访问</h1>
    <p class="subtitle">此区域受保护
你需要完成身份验证</p>

    <div class="actions">
      <a href="/challenge" class="btn btn-primary">前往验证</a>
      <a href="https://github.com/liyunhan177/SWABox" target="_blank" class="btn btn-secondary">
        查看项目仓库
      </a>
    </div>
  </div>
</body>
</html>
