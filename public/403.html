<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - 禁止访问 | SWABox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        .background-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            transition: transform 0.1s ease-out;
            max-width: 800px;
        }

        .icon-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 32px;
        }

        .icon-svg {
            width: 100%;
            height: 100%;
            animation: float 3.5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .status-code {
            position: absolute;
            bottom: -12px;
            right: -24px;
            font-size: 52px;
            font-weight: 900;
            color: rgba(255, 165, 0, 0.25); /* 橙色调表示警告 */
            font-family: 'Courier New', monospace;
        }

        .title {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 18px;
            background: linear-gradient(90deg, #fff, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 17px;
            color: #bbb;
            line-height: 1.7;
            margin-bottom: 48px;
        }

        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary,
        .btn-secondary {
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #f97316;
            color: #fff;
            border: none;
        }

        .btn-primary:hover {
            background: #d4620d;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: #f97316;
            border: 2px solid #f97316;
        }

        .btn-secondary:hover {
            background: rgba(249, 115, 22, 0.1);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .title { font-size: 32px; }
            .subtitle { font-size: 15px; }
            .icon-wrapper { width: 140px; height: 140px; }
            .status-code { font-size: 42px; }
        }

        @media (max-width: 480px) {
            .actions { flex-direction: column; }
            .btn-primary, .btn-secondary { width: 100%; }
        }
    </style>
</head>
<body>
<div class="background-grid"></div>
<div class="content" id="content">
    <div class="icon-wrapper">
        <svg class="icon-svg" viewBox="0 0 100 100" fill="none">
            <!-- 盾牌加锁图形 -->
            <path d="M50 10 L80 22 L80 55 C80 73 65 86 50 90 C35 86 20 73 20 55 L20 22 Z" stroke="#f97316" stroke-width="4" fill="none"/>
            <rect x="38" y="42" width="24" height="22" rx="3" stroke="#f97316" stroke-width="4"/>
            <circle cx="50" cy="52" r="4" fill="#f97316"/>
            <path d="M45 42 V35 C45 29 49 25 50 25 C51 25 55 29 55 35 V42" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <span class="status-code">403</span>
    </div>

    <h1 class="title">禁止访问</h1>
    <p class="subtitle">
        圣所之塔控制权限被收回<br>
        你没有足够的权限 😤
    </p>

    <div class="actions">
        <a href="/" class="btn-primary">返回首页</a>
        <a href="https://github.com/liyunhan177/SWABox" target="_blank" class="btn-secondary">
            查看项目仓库
        </a>
    </div>
</div>

<script>
    const content = document.getElementById('content');
    document.body.addEventListener('mousemove', (e) => {
        const { clientX, clientY } = e;
        const x = (window.innerWidth / 2 - clientX) / 60;
        const y = (window.innerHeight / 2 - clientY) / 60;
        content.style.transform = `translate(${x}px, ${y}px)`;
    });
</script>
</body>
</html>
