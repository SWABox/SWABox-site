<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面迷路了 | SWABox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        .background-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            transition: transform 0.1s ease-out;
            max-width: 800px;
        }

        .logo-link {
            display: inline-block;
            margin-bottom: 40px;
        }

        .logo-img {
            height: 56px;
            width: auto;
            opacity: 0.9;
            transition: opacity 0.3s;
        }

        .logo-img:hover {
            opacity: 1;
        }

        .icon-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 32px;
        }

        .broken-box {
            width: 100%;
            height: 100%;
            animation: float 3.5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .status-code {
            position: absolute;
            bottom: -12px;
            right: -24px;
            font-size: 52px;
            font-weight: 900;
            color: rgba(0, 120, 215, 0.25);
            font-family: 'Courier New', monospace;
        }

        .title {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 18px;
            background: linear-gradient(90deg, #fff, #0078d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 17px;
            color: #bbb;
            line-height: 1.7;
            margin-bottom: 48px;
        }

        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary,
        .btn-secondary {
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #0078d7;
            color: #fff;
            border: none;
        }

        .btn-primary:hover {
            background: #005fa3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: #0078d7;
            border: 2px solid #0078d7;
        }

        .btn-secondary:hover {
            background: rgba(0, 120, 215, 0.1);
            transform: translateY(-2px);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .title { font-size: 32px; }
            .subtitle { font-size: 15px; }
            .icon-wrapper { width: 140px; height: 140px; }
            .status-code { font-size: 42px; }
        }

        @media (max-width: 480px) {
            .actions { flex-direction: column; }
            .btn-primary, .btn-secondary { width: 100%; }
        }
    </style>
</head>
<body>
<div class="background-grid"></div>
<div class="content" id="content">

    <div class="icon-wrapper">
        <svg class="broken-box" viewBox="0 0 100 100" fill="none">
            <rect x="10" y="10" width="80" height="80" stroke="#0078d7" stroke-width="4"/>
            <line x1="10" y1="10" x2="90" y2="90" stroke="#0078d7" stroke-width="4" stroke-linecap="round"/>
            <line x1="90" y1="10" x2="10" y2="90" stroke="#0078d7" stroke-width="4" stroke-linecap="round"/>
            <circle cx="50" cy="50" r="15" stroke="#0078d7" stroke-width="4"/>
        </svg>
        <span class="status-code">404</span>
    </div>

    <h1 class="title">页面迷路了</h1>
    <p class="subtitle">
        你访问的地址不存在<br>
        可能被色彩侵蚀了 😅
    </p>

    <div class="actions">
        <a href="https://liyunhan177.github.io/SWABox-site/" class="btn-primary">返回首页</a>
        <a href="https://github.com/liyunhan177/SWABox" target="_blank" class="btn-secondary">
            查看项目仓库
        </a>
    </div>
</div>

<script>
    const content = document.getElementById('content');
    document.body.addEventListener('mousemove', (e) => {
        const { clientX, clientY } = e;
        const x = (window.innerWidth / 2 - clientX) / 60;
        const y = (window.innerHeight / 2 - clientY) / 60;
        content.style.transform = `translate(${x}px, ${y}px)`;
    });
</script>
</body>
</html>
