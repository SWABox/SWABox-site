<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title><!DOCTYPE html>
        <html lang="zh-CN">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>500 - 服务器错误 | SWABox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        .background-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            transition: transform 0.1s ease-out;
            max-width: 800px;
        }

        .icon-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 32px;
        }

        .icon-svg {
            width: 100%;
            height: 100%;
            animation: float 3.5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .status-code {
            position: absolute;
            bottom: -12px;
            right: -24px;
            font-size: 52px;
            font-weight: 900;
            color: rgba(220, 38, 38, 0.25); /* 红色调表示严重错误 */
            font-family: 'Courier New', monospace;
        }

        .title {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 18px;
            background: linear-gradient(90deg, #fff, #dc2626);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 17px;
            color: #bbb;
            line-height: 1.7;
            margin-bottom: 48px;
        }

        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary,
        .btn-secondary {
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #dc2626;
            color: #fff;
            border: none;
        }

        .btn-primary:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: #dc2626;
            border: 2px solid #dc2626;
        }

        .btn-secondary:hover {
            background: rgba(220, 38, 38, 0.1);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .title { font-size: 32px; }
            .subtitle { font-size: 15px; }
            .icon-wrapper { width: 140px; height: 140px; }
            .status-code { font-size: 42px; }
        }

        @media (max-width: 480px) {
            .actions { flex-direction: column; }
            .btn-primary, .btn-secondary { width: 100%; }
        }
    </style>
</head>
<body>
<div class="background-grid"></div>
<div class="content" id="content">
    <div class="icon-wrapper">
        <svg class="icon-svg" viewBox="0 0 100 100" fill="none">
            <!-- 齿轮爆炸/警告图形 -->
            <circle cx="50" cy="50" r="30" stroke="#dc2626" stroke-width="4" stroke-dasharray="8 6"/>
            <circle cx="50" cy="50" r="15" stroke="#dc2626" stroke-width="4"/>
            <line x1="50" y1="20" x2="50" y2="35" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
            <line x1="50" y1="65" x2="50" y2="80" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
            <line x1="20" y1="50" x2="35" y2="50" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
            <line x1="65" y1="50" x2="80" y2="50" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
            <path d="M25 25 L35 35" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
            <path d="M65 65 L75 75" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
            <path d="M75 25 L65 35" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
            <path d="M35 65 L25 75" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <span class="status-code">500</span>
    </div>

    <h1 class="title">服务器出错了</h1>
    <p class="subtitle">
        色彩入侵了基沃托斯<br>
        我们正在紧急修复中 🔧
    </p>

    <div class="actions">
        <a href="/" class="btn-primary">返回首页</a>
        <a href="https://github.com/liyunhan177/SWABox" target="_blank" class="btn-secondary">
            查看项目仓库
        </a>
    </div>
</div>

<script>
    const content = document.getElementById('content');
    document.body.addEventListener('mousemove', (e) => {
        const { clientX, clientY } = e;
        const x = (window.innerWidth / 2 - clientX) / 60;
        const y = (window.innerHeight / 2 - clientY) / 60;
        content.style.transform = `translate(${x}px, ${y}px)`;
    });
</script>
</body>
</html>
