<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWABox · 开发与使用文档</title>
    <!-- 复用你站点的主题色 -->
    <style>
        :root {
            --accent-purple: #818cf8;
            --accent-blue: #0078d7;
            --bg-dark: #0f0f0f;
            --text-primary: #fff;
            --text-secondary: #aaa;
        }
        /* 隐藏 docsify 默认侧边栏切换按钮（用你自己的导航栏） */
        .sidebar-toggle { display: none !important; }
        /* 调整内容区边距，适配你的导航栏高度 */
        .content { padding-top: 80px !important; }
    </style>
    <!-- docsify 核心（用 CDN，无需本地存储） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
<!-- 复用你站点的导航栏（与 www.swabox.cc.cd 完全一致） -->
<nav class="navbar" style="
    position: fixed;
    top: 0;
    width: 100%;
    height: 64px;
    background: rgba(15, 15, 15, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    padding: 0 24px;
    z-index: 1000;
  ">
    <img src="/logo-nobg.png" alt="SWABox Logo" style="height: 44px;">
    <div style="margin-left: auto; display: flex; gap: 24px;">
        <a href="/" style="color: var(--text-secondary); text-decoration: none;">首页</a>
        <a href="/download" style="color: var(--text-secondary); text-decoration: none;">下载</a>
        <a href="/docs" style="color: var(--accent-purple); text-decoration: none; font-weight: bold;">文档</a>
        <a href="https://github.com/liyunhan177/SWABox" target="_blank" style="color: var(--text-secondary); text-decoration: none;">GitHub</a>
    </div>
</nav>

<!-- docsify 挂载点 -->
<div id="app"></div>

<!-- 复用你站点的页脚（与 www.swabox.cc.cd 完全一致） -->
<footer style="
    background: #1a1a2e;
    color: #666;
    padding: 22px 0;
    text-align: center;
    border-top: 1px solid #333;
    margin-top: 60px;
  ">
    <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
        <div style="display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;">
            <span>© 2026 <strong style="color:var(--accent-purple)">SWABox</strong> · MIT</span>
            <span style="opacity: 0.5;">·</span>
            <a href="/privacy.html" style="color: var(--accent-purple); text-decoration: none;">隐私政策</a>
            <span style="opacity: 0.5;">·</span>
            <a href="mailto:content@swabox.cc.cd" style="color: var(--text-secondary); text-decoration: none;">联系我们</a>
            <span style="opacity: 0.5;">·</span>
            <a href="https://github.com/liyunhan177/SWABox" target="_blank" style="color: var(--text-secondary); text-decoration: none;">GitHub →</a>
        </div>
        <p style="font-size: 12px;">本工具仅供教育设备管理用途，请勿用于非法用途。</p>
    </div>
</footer>

<!-- docsify 脚本（配置子目录文档） -->
<script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
<script>
    window.$docsify = {
        // 关键：指定文档根路径为 /docs/（对应你的 public/docs 目录）
        basePath: '/docs/',
        // 侧边栏配置（对应子目录结构）
        loadSidebar: true,
        sidebar: [
            { title: '🏠 概览', children: [['README', '简介与快速开始']] },
            { title: '🛠 使用指南', children: [
                    ['usage/basic', '基础操作'],
                    ['usage/tools', '工具箱功能'],
                    ['usage/faq', '常见问题']
                ]},
            { title: '💻 开发文档', children: [
                    ['dev/env', '环境搭建'],
                    ['dev/structure', '项目结构'],
                    ['dev/contribute', '贡献指南']
                ]}
        ],
        // 主题适配你的站点
        themeColor: '#818cf8',
        name: 'SWABox 文档',
        logo: '/logo-nobg.png',
        // 禁用 docsify 默认搜索（用你自己的导航栏）
        search: false
    }
</script>
</body>
</html>
